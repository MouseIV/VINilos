<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - VinylMarket</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

<div class="auth-container">
  <h2>Iniciar sesión</h2>
  
  <form id="loginForm">
    <div class="input-group">
      <label>Correo electrónico</label>
      <input type="email" id="loginEmail" placeholder="usuario@ejemplo.com" required>
    </div>
    
    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required>
    </div>
    
    <button type="submit" class="btn-primary">Entrar</button>
    
    <div class="auth-links">
      <a href="register.html">¿No tienes cuenta? Regístrate</a>
      <a href="forgot-password.html">¿Contraseña olvidada?</a>
      <a href="dashboard.html">Cancelar</a>
    </div>
  </form>
</div>

<script src="js/app.js"></script>
</body>
</html>
