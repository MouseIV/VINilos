<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - VinylMarket</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

<div class="auth-container">
  <h2>Crear cuenta</h2>
  
  <form id="registerForm">
    <div class="input-group">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Tu nombre" required>
    </div>
    
    <div class="input-group">
      <label>Nombre de usuario</label>
      <input type="text" id="username" placeholder="@usuario" required>
    </div>
    
    <div class="input-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
    </div>
    
    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 10 caracteres" required>
    </div>
    
    <button type="submit" class="btn-primary">Registrarse</button>
    
    <div class="auth-links">
      <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
      <a href="dashboard.html">Cancelar</a>
    </div>
  </form>
</div>

<script src="js/app.js"></script>
</body>
</html>
