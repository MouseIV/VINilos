<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - VinylMarket</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

<div class="auth-container">
  <h2>Recuperar contraseña</h2>
  <p>Te enviaremos un código para restablecer tu contraseña</p>
  
  <form id="forgotForm">
    <div class="input-group">
      <label>Correo electrónico</label>
      <input type="email" id="resetEmail" placeholder="usuario@ejemplo.com" required>
    </div>
    
    <button type="submit" class="btn-primary">Enviar código</button>
    
    <div class="auth-links">
      <a href="login.html">Volver al inicio de sesión</a>
      <a href="dashboard.html">Cancelar</a>
    </div>
  </form>
</div>

<script src="js/app.js"></script>
</body>
</html>
